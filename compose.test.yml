# Test-specific overrides for compose.yml.
# Usage: docker compose -f compose.yml -f compose.test.yml up

services:
  api:
    environment:
      GLOW_SECRET_KEY: smoke-test-secret
      GLOW_CORS_ORIGINS: '["http://127.0.0.1:3000"]'
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: "no"

  api-db:
    restart: "no"

  dashboard:
    environment:
      PUBLIC_API_BASE: http://127.0.0.1:8000
    restart: "no"
