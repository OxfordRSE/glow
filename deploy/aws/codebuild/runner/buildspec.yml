version: 0.2

phases:
  install:
    commands:
      - apt-get update
      - apt-get install -y curl git gnupg lsb-release unzip
      - curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      - echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" > /etc/apt/sources.list.d/hashicorp.list
      - apt-get update
      - apt-get install -y packer
  build:
    commands:
      - test -n "$GIT_REPO_URL"
      - test -n "$GIT_REF"
      - test -n "$RUNNER_AMI_VERSION"
      - rm -rf /tmp/glow-source
      - git clone "$GIT_REPO_URL" /tmp/glow-source
      - cd /tmp/glow-source
      - git checkout "$GIT_REF"
      - test "$(tr -d '\n' < deploy/aws/runner/VERSION)" = "$RUNNER_AMI_VERSION"
      - cd /tmp/glow-source/deploy/aws/runner
      - packer init packer.pkr.hcl
      - packer build -var "aws_region=$AWS_DEFAULT_REGION" -var "runner_ami_version=$RUNNER_AMI_VERSION" packer.pkr.hcl
