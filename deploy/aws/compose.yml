services:
  deploy:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile
    image: glow-launcher:latest
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-eu-west-2}
    volumes:
      # Seed container-local AWS state from a read-only host mount.
      - ${HOME}/.aws:/aws-host:ro
      - .:/opt/glow/deploy/aws
    profiles:
      - sso
    # No command specified - pass arguments via 'docker compose run --profile sso deploy --domain ...'

  deploy-env:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile
    image: glow-launcher:latest
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-eu-west-2}
    volumes:
      - .:/opt/glow/deploy/aws
    profiles:
      - env
    # No volumes - uses environment credentials only
    # Usage: docker compose run --profile env deploy-env --domain ...
