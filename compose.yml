# Canonical service specification for glow-core
# Used by: local dev, CI smoke tests
# Production uses same images with different env/infra

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn glow_api.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    environment:
      GLOW_DATA_PATH: /data/data.csv
      GLOW_MIN_N: ${GLOW_MIN_N:-5}
      GLOW_SECRET_KEY: ${GLOW_SECRET_KEY:-change-me-in-production}
      GLOW_DATABASE_URL: sqlite:////data/auth.db
      GLOW_CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./data:/data
      - ./api:/app
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - app
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    ports:
      - "5173:5173"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    restart: unless-stopped

networks:
  app:

volumes:
  dashboard_node_modules:
