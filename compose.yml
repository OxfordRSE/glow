# Canonical service specification for ib-ox-core
# Used by: local dev, CI smoke tests, and devcontainer
# Production uses same images with different env/infra

services:
  proxy:
    image: nginx:alpine
    ports:
      - "5173:5173"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uvicorn ib_ox_api.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    environment:
      IB_OX_DATA_PATH: /data/data.csv
      IB_OX_MIN_N: ${IB_OX_MIN_N:-5}
      IB_OX_SECRET_KEY: ${IB_OX_SECRET_KEY:-change-me-in-production}
      IB_OX_DATABASE_URL: sqlite:////data/auth.db
      IB_OX_CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./data:/data
      - ./api:/app
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  dashboard_node_modules:
