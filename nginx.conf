# Use variables for upstream targets so nginx resolves through Docker DNS
# at request time and can recover after containers are replaced.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 5173;

    location /api/ {
        set $api_upstream http://api:8000;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $dashboard_upstream http://dashboard:3000;
        proxy_pass $dashboard_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support SvelteKit HMR websockets in dev
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
