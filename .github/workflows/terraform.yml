name: Terraform Validation

on:
  pull_request:
    paths:
      - 'deploy/aws/terraform/**'
      - 'deploy/aws/terraform_bootstrap/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'deploy/aws/terraform/**'
      - 'deploy/aws/terraform_bootstrap/**'
      - '.github/workflows/terraform.yml'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'

      - name: Terraform Format Check
        run: |
          terraform -chdir=deploy/aws/terraform fmt -check -recursive
          terraform -chdir=deploy/aws/terraform_bootstrap fmt -check -recursive

      - name: Terraform Init and Validate
        run: |
          terraform -chdir=deploy/aws/terraform init -backend=false
          terraform -chdir=deploy/aws/terraform validate -no-color
          terraform -chdir=deploy/aws/terraform_bootstrap init -backend=false
          terraform -chdir=deploy/aws/terraform_bootstrap validate -no-color

  tflint:
    name: TFLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: 'v0.50.0'

      - name: Init TFLint
        run: tflint --init
        working-directory: deploy/aws/terraform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint (main)
        run: tflint --format compact
        working-directory: deploy/aws/terraform

      - name: Run TFLint (bootstrap)
        run: tflint --format compact
        working-directory: deploy/aws/terraform_bootstrap
