# Development overrides for compose.yml.

services:
  api:
    working_dir: /app
    volumes:
      - ./data:/data
      - ./api:/app
    environment:
      GLOW_CORS_ORIGINS: ${GLOW_CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}

  dashboard:
    build:
      target: dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://127.0.0.1:8000}

  nginx:
    environment:
      EXTRA_SERVER_NAMES: " localhost 127.0.0.1"

volumes:
  dashboard_node_modules:
